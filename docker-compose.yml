version: '3.8'

services:
  db:
    image: postgres:15
    container_name: volunteer_db
    environment:
      POSTGRES_USER: volunteer_user
      POSTGRES_PASSWORD: volunteer_password
      POSTGRES_DB: volunteer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
